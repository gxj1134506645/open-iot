# Redis 配置示例
# 将此配置添加到 application-dev.yml 或 application-prod.yml

spring:
  data:
    redis:
      # 单机模式
      host: 127.0.0.1
      port: 6379
      password: openiot123
      database: 0

      # 连接池配置（Lettuce）
      lettuce:
        pool:
          max-active: 20      # 最大连接数
          max-idle: 10        # 最大空闲连接
          min-idle: 5         # 最小空闲连接
          max-wait: 3000      # 获取连接最大等待时间（毫秒）
        shutdown-timeout: 5000  # 关闭超时时间（毫秒）

      # 超时配置
      timeout: 3000  # 连接超时时间（毫秒）

      # 集群模式（可选）
      # cluster:
      #   nodes:
      #     - 127.0.0.1:6379
      #     - 127.0.0.1:6380
      #     - 127.0.0.1:6381
      #   max-redirects: 3

      # 哨兵模式（可选）
      # sentinel:
      #   master: mymaster
      #   nodes:
      #     - 127.0.0.1:26379
      #     - 127.0.0.1:26380
      #     - 127.0.0.1:26381

# Redisson 配置（可选，默认使用 spring.redis.* 配置）
# 如需自定义 Redisson 配置，创建 redisson.yml 或 redisson-config.json
# spring:
#   redis:
#     redisson:
#       config: classpath:redisson.yml

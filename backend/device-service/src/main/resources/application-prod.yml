server:
  port: 8081

spring:
  config:
    activate:
      on-profile: prod

  # 生产环境数据源
  datasource:
    url: jdbc:postgresql://${DB_HOST:prod-db.internal}:5432/${DB_NAME:openiot}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # 生产环境 Redis
  data:
    redis:
      host: ${REDIS_HOST:prod-redis.internal}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 2
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # 生产环境 Kafka
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:prod-kafka1:9092,prod-kafka2:9092,prod-kafka3:9092}

# 生产环境日志配置
logging:
  level:
    root: INFO
    com.openiot: INFO
    com.baomidou.mybatisplus: INFO
    org.springframework.web: INFO
    org.springframework.kafka: INFO
    io.netty: WARN

# 可观测性配置（生产环境）
openiot:
  observability:
    tracing:
      enabled: true
      sampling-probability: 0.1  # 10% 采样（生产环境降低采样率）
      otlp-endpoint: http://${OTEL_HOST:prod-otel-collector}:4317
    logging:
      tenant-mdc: true
      sensitive-data-masking: true  # 生产环境必须脱敏
    metrics:
      business-enabled: true
      hikari-enabled: true
      redis-enabled: true

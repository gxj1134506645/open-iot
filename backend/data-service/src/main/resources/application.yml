server:
  port: 8085

spring:
  application:
    name: data-service
  profiles:
    active: dev  # 默认激活开发环境

  # Nacos 配置（公共）
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        enabled: false

  # 数据源驱动（公共）
  datasource:
    driver-class-name: org.postgresql.Driver

# Flyway 配置（独立数据库架构）
# 说明：data-service 使用独立的 openiot_data 数据库
# 包含：device_trajectory、raw_event 等数据相关表
spring.flyway:
  enabled: true  # 启用 Flyway
  locations: classpath:db/migration

  # MongoDB 配置（公共）
  data:
    mongodb:
      auto-index-creation: true

  # Kafka 配置（公共）
  kafka:
    consumer:
      group-id: data-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      fetch-min-size: 1024
      fetch-max-wait: 500ms
      max-poll-interval: 300000
      session-timeout: 30000
      heartbeat-interval: 10000
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.openiot.*"
    listener:
      type: batch
      ack-mode: manual
      concurrency: 3
      auto-startup: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      batch-size: 16384
      buffer-memory: 33554432
      linger-ms: 5
      compression-type: lz4
      acks: all
      retries: 3

# MyBatis Plus 配置（公共）
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Actuator 配置（公共）
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  health:
    liveness:
      enabled: true
    readiness:
      enabled: true

# 可观测性配置（公共）
openiot:
  observability:
    tracing:
      enabled: true
    logging:
      tenant-mdc: true
    metrics:
      business-enabled: true
      hikari-enabled: true
      redis-enabled: true
      mongodb-enabled: true
      kafka-enabled: true

# InfluxDB 时序数据库配置
influxdb:
  enabled: true
  url: http://localhost:8086
  token: admin-token
  org: openiot
  bucket: device-data
  connect-timeout: 10000
  write-timeout: 10000
  read-timeout: 30000
  batch-size: 1000
  flush-interval: 5000
  gzip-enabled: true

# 日志配置
logging:
  config: classpath:logback-spring.xml

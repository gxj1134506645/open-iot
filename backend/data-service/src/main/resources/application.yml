server:
  port: 8085

spring:
  application:
    name: data-service
  config:
    import: "optional:nacos:"
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        enabled: false
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/openiot
    username: openiot
    password: openiot123
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: openiot123
      database: 0
    mongodb:
      # MongoDB 连接 URI，authSource=admin 表示用户认证信息存储在 admin 数据库
      uri: mongodb://openiot:openiot123@127.0.0.1:27017/openiot?authSource=admin
      # 自动创建索引
      auto-index-creation: true
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    consumer:
      group-id: data-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      # 批量消费配置
      max-poll-records: 500
      fetch-min-size: 1024
      fetch-max-wait: 500ms
      # 单次 poll 最大间隔
      max-poll-interval: 300000
      # 会话超时
      session-timeout: 30000
      heartbeat-interval: 10000
      # 反序列化
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.openiot.*"
    listener:
      # 批量消费模式
      type: batch
      # 手动确认
      ack-mode: manual
      # 并发数
      concurrency: 3
      # 自动启动
      auto-startup: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # 生产者性能配置
      batch-size: 16384
      buffer-memory: 33554432
      linger-ms: 5
      compression-type: lz4
      acks: all
      retries: 3

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.openiot: debug

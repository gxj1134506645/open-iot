server:
  port: 8086

spring:
  application:
    name: tenant-service
  config:
    import: "optional:nacos:"
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        enabled: false
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/openiot
    username: openiot
    password: openiot123
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: openiot123
      database: 0

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleteFlag
      logic-delete-value: '1'
      logic-not-delete-value: '0'

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

spring.flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true
  validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
    metrics:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  health:
    liveness:
      enabled: true
    readiness:
      enabled: true

# 可观测性配置
openiot:
  observability:
    tracing:
      enabled: true
      sampling-probability: 1.0
      otlp-endpoint: http://tempo:4317
    logging:
      tenant-mdc: true
      sensitive-data-masking: true
    metrics:
      business-enabled: true
      hikari-enabled: true
      redis-enabled: true

logging:
  level:
    com.openiot: debug
  config: classpath:logback-spring.xml

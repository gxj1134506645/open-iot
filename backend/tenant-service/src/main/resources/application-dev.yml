server:
  port: 8086

spring:
  config:
    activate:
      on-profile: dev

  # 租户服务数据库（独立数据库）
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/openiot_tenant
    username: openiot
    password: openiot123

  # 开发环境 Redis
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: openiot123
      database: 0

# 开发环境日志配置
logging:
  level:
    root: INFO
    com.openiot: DEBUG
    com.baomidou.mybatisplus: DEBUG
    org.springframework.security: DEBUG
    cn.dev33.satoken: DEBUG

# Tracing 配置 - 使用 OpenTelemetry
management:
  tracing:
    enabled: true
    propagation:
      type: b3  # 使用 B3 传播格式

# Sa-Token 开发环境配置
sa-token:
  is-log: true  # 开发环境开启日志
  timeout: 86400  # 24小时

# Flyway 开发环境配置
spring.flyway:
  enabled: true
  clean-disabled: false  # 开发环境允许清理

# 可观测性配置（开发环境）
openiot:
  observability:
    tracing:
      enabled: true
      sampling-probability: 1.0  # 100% 采样
      otlp-endpoint: http://localhost:4317
    logging:
      tenant-mdc: true
      sensitive-data-masking: false  # 开发环境不脱敏
    metrics:
      business-enabled: true
      hikari-enabled: true
      redis-enabled: true

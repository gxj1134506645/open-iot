server:
  port: 8086

spring:
  config:
    activate:
      on-profile: prod

  # 生产环境数据源
  datasource:
    url: jdbc:postgresql://${DB_HOST:prod-db.internal}:5432/${DB_NAME:openiot}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # 生产环境 Redis
  data:
    redis:
      host: ${REDIS_HOST:prod-redis.internal}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 2
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

# 生产环境日志配置
logging:
  level:
    root: INFO
    com.openiot: INFO
    com.baomidou.mybatisplus: INFO
    org.springframework.security: INFO
    cn.dev33.satoken: WARN

# Sa-Token 生产环境配置
sa-token:
  is-log: false
  timeout: 86400  # 24小时
  token-style: uuid
  is-concurrent: false  # 生产环境不允许并发登录

# Flyway 生产环境配置
spring.flyway:
  enabled: true
  clean-disabled: true  # 生产环境禁止清理
  validate-on-migrate: true

# 可观测性配置（生产环境）
openiot:
  observability:
    tracing:
      enabled: true
      sampling-probability: 0.1  # 10% 采样
      otlp-endpoint: http://${OTEL_HOST:prod-otel-collector}:4317
    logging:
      tenant-mdc: true
      sensitive-data-masking: true  # 生产环境必须脱敏
    metrics:
      business-enabled: true
      hikari-enabled: true
      redis-enabled: true

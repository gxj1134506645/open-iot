server:
  port: 8080

spring:
  config:
    activate:
      on-profile: test

  # 测试环境 Redis
  data:
    redis:
      host: test-redis.internal
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 1

# 测试环境日志配置
logging:
  level:
    root: INFO
    com.openiot: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO

# Sa-Token 测试环境配置
sa-token:
  is-log: false
  timeout: 43200  # 12小时

# 可观测性配置（测试环境）
openiot:
  observability:
    tracing:
      enabled: true
      sampling-probability: 0.5  # 50% 采样
      otlp-endpoint: http://test-otel-collector:4317
    logging:
      tenant-mdc: true
      sensitive-data-masking: true  # 测试环境脱敏
    metrics:
      business-enabled: true
      redis-enabled: true

server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:nacos:
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 设备服务路由
        - id: device-service
          uri: lb://device-service
          predicates:
            - Path=/api/v1/devices/**,/api/v1/auth/**
          filters:
            - StripPrefix=0

        # 租户服务路由
        - id: tenant-service
          uri: lb://tenant-service
          predicates:
            - Path=/api/v1/tenants/**,/api/v1/users/**
          filters:
            - StripPrefix=0

        # 数据服务路由
        - id: data-service
          uri: lb://data-service
          predicates:
            - Path=/api/v1/data/**,/api/v1/replay/**
          filters:
            - StripPrefix=0

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: openiot123
      database: 0

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# 日志配置
logging:
  level:
    com.openiot: debug
    org.springframework.cloud.gateway: debug

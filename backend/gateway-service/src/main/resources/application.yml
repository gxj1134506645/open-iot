server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: "optional:nacos:"
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        namespace: public
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: tenant-service
          uri: lb://tenant-service
          predicates:
            - Path=/api/v1/tenants/**,/api/v1/users/**,/api/v1/auth/**
          filters:
            - StripPrefix=0
        - id: device-service
          uri: lb://device-service
          predicates:
            - Path=/api/v1/devices/**
          filters:
            - StripPrefix=0
        - id: data-service
          uri: lb://data-service
          predicates:
            - Path=/api/v1/data/**,/api/v1/replay/**,/api/v1/sse/**
          filters:
            - StripPrefix=0
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: openiot123
      database: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus,metrics,bindings
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true
    prometheus:
      enabled: true
    metrics:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      service: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  health:
    liveness:
      enabled: true
    readiness:
      enabled: true

# 可观测性配置
openiot:
  observability:
    tracing:
      enabled: true
      sampling-probability: 1.0
      otlp-endpoint: http://tempo:4317
    logging:
      tenant-mdc: true
      sensitive-data-masking: true
    metrics:
      business-enabled: true
      hikari-enabled: true
      redis-enabled: true

logging:
  level:
    com.openiot: debug
    org.springframework.cloud.gateway: debug
  config: classpath:logback-spring.xml

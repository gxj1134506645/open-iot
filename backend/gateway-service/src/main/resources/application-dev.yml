server:
  port: 8080

spring:
  config:
    activate:
      on-profile: dev

  # 开发环境 Nacos 配置
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
        enabled: true
        group: DEFAULT_GROUP
        service: gateway-service
      config:
        enabled: false

  # 开发环境 Redis
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: openiot123
      database: 0

# 开发环境日志配置
logging:
  level:
    root: INFO
    com.openiot: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG

# Tracing 配置 - 使用 OpenTelemetry
management:
  tracing:
    enabled: true
    propagation:
      type: b3  # 使用 B3 传播格式

# Sa-Token 开发环境配置
sa-token:
  is-log: true  # 开发环境开启日志

# 可观测性配置（开发环境）
openiot:
  observability:
    tracing:
      enabled: true
      sampling-probability: 1.0  # 100% 采样
      otlp-endpoint: http://localhost:4317
    logging:
      tenant-mdc: true
      sensitive-data-masking: false  # 开发环境不脱敏
    metrics:
      business-enabled: true
      redis-enabled: true

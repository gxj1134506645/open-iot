version: '3.8'

services:
  # ==================== Nacos (注册中心 + 配置中心) ====================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: open-iot-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - SPRING_DATASOURCE_PLATFORM=mysql
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== PostgreSQL (主数据库) ====================
  postgres:
    image: postgres:15-alpine
    container_name: open-iot-postgres
    environment:
      - POSTGRES_USER=openiot
      - POSTGRES_PASSWORD=openiot123
      - POSTGRES_DB=openiot
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres/data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== Redis (缓存 + 会话) ====================
  redis:
    image: redis:7-alpine
    container_name: open-iot-redis
    command: redis-server --appendonly yes --requirepass openiot123
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis/data:/data
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== MongoDB (原始事件存储) ====================
  mongo:
    image: mongo:7
    container_name: open-iot-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=openiot
      - MONGO_INITDB_ROOT_PASSWORD=openiot123
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo/data:/data/db
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== Zookeeper (Kafka 依赖) ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: open-iot-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - ./data/zookeeper/data:/var/lib/zookeeper/data
      - ./data/zookeeper/logs:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== Kafka (消息队列) ====================
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: open-iot-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ./data/kafka/data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== EMQX (MQTT Broker) ====================
  emqx:
    image: emqx/emqx:5.4.1
    container_name: open-iot-emqx
    environment:
      - EMQX_NAME=open-iot-emqx
      - EMQX_HOST=0.0.0.0
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=admin123
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # WebSocket
      - "8084:8084"    # WSS
      - "8883:8883"    # MQTTS
      - "18083:18083"  # Dashboard
    volumes:
      - ./data/emqx/data:/opt/emqx/data
      - ./data/emqx/log:/opt/emqx/log
      - ../emqx/emqx.conf:/opt/emqx/etc/emqx.conf
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== Kafka UI (可选 - 消息监控) ====================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: open-iot-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: open-iot-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    restart: unless-stopped
    networks:
      - open-iot-network

networks:
  open-iot-network:
    driver: bridge

volumes:
  nacos-data:
  postgres-data:
  redis-data:
  mongo-data:
  zookeeper-data:
  kafka-data:
  emqx-data:

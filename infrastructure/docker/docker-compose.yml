services:
  # ==================== Nacos (注册中心 + 配置中心) ====================
  nacos:
    # Use slim variant for better cross-platform support (Windows amd64 / macOS arm64)
    image: nacos/nacos-server:v2.3.2-slim
    container_name: open-iot-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,metrics,prometheus
      - MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED=true
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=true
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== PostgreSQL (主数据库) ====================
  postgres:
    image: postgres:16-alpine
    container_name: open-iot-postgres
    environment:
      - POSTGRES_USER=openiot
      - POSTGRES_PASSWORD=openiot123
      - POSTGRES_DB=openiot
    ports:
      - "5432:5432"
    volumes:
      # Windows: 使用本地路径挂载，开发环境持久化数据
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
      # 初始化脚本：PostgreSQL 官方推荐方式，在容器首次启动时自动执行
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== Redis (缓存 + 会话) ====================
  redis:
    image: redis:7-alpine
    container_name: open-iot-redis
    command: redis-server --appendonly yes --requirepass openiot123
    ports:
      - "6379:6379"
    volumes:
      - ${REDIS_DATA_PATH:-./data/redis}:/data
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== MongoDB (原始事件存储) ====================
  mongo:
    image: mongo:7
    container_name: open-iot-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=openiot
      - MONGO_INITDB_ROOT_PASSWORD=openiot123
    ports:
      - "27017:27017"
    volumes:
      - ${MONGO_DATA_PATH:-./data/mongo}:/data/db
      - ${MONGO_CONFIG_PATH:-./data/mongo/config}:/data/config
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== Zookeeper (Kafka 依赖) ====================
  # Windows 兼容：使用本地路径挂载
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: open-iot-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - ${ZOOKEEPER_DATA_PATH:-./data/zookeeper/data}:/var/lib/zookeeper/data
      - ${ZOOKEEPER_LOGS_PATH:-./data/zookeeper/log}:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== Kafka (消息队列) ====================
  # Windows 兼容：使用本地路径挂载
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: open-iot-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9093,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ${KAFKA_DATA_PATH:-./data/kafka}:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== EMQX (MQTT Broker) ====================
  # Windows 兼容：不挂载 volumes，使用容器内部存储
  emqx:
    image: emqx/emqx:5.4.1
    container_name: open-iot-emqx
    privileged: true
    user: root
    environment:
      - EMQX_NAME=open-iot-emqx
      - EMQX_HOST=0.0.0.0
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=admin123
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # WebSocket
      - "8084:8084"    # WSS
      - "8883:8883"    # MQTTS
      - "18083:18083"  # Dashboard
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== Kafka UI (可选 - 消息监控) ====================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: open-iot-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: open-iot-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    restart: unless-stopped
    networks:
      - open-iot-network

  # ==================== InfluxDB (时序数据库) ====================
  influxdb:
    image: influxdb:2.7
    container_name: open-iot-influxdb
    ports:
      - "8086:8086"
    volumes:
      - ${INFLUXDB_DATA_PATH:-./data/influxdb}:/var/lib/influxdb2
      - ${INFLUXDB_CONFIG_PATH:-./data/influxdb/config}:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123456
      - DOCKER_INFLUXDB_INIT_ORG=openiot
      - DOCKER_INFLUXDB_INIT_BUCKET=device-data
      - DOCKER_INFLUXDB_INIT_RETENTION=90d
    restart: unless-stopped
    networks:
      - open-iot-network

networks:
  open-iot-network:
    driver: bridge

## ACL 配置
authorization {
  sources = [
    {
      type = "file"
      path = "/opt/emqx/etc/acl.conf"
    }
  ]
  no_match = "deny"
  cache {
    enable = true
    max_size = 32
    ttl = 1m
  }
}


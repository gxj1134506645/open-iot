## Dashboard 配置
dashboard {
  listeners.http {
    bind = "0.0.0.0:18083"
  }
  default_username = "admin"
  default_password = "admin123"
}

## 日志配置
log {
  file {
    enable = true
    level = "info"
    path = "/opt/emqx/log/emqx.log"
    rotation_count = 10
    rotation_size = "50MB"
  }
  console {
    enable = true
    level = "info"
  }
}

## 限流配置
limiter {
  client {
    messages {
      rate = "1000/s"
      capacity = 10000
    }
    bytes {
      rate = "1MB/s"
      capacity = "10MB"
    }
  }
}
